<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Minimal Markdown Editor</title>
    
    <!-- Tailwind CSS & Typography Plugin -->
    <script src="https://cdn.tailwindcss.com?plugins=typography"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    typography: {
                        DEFAULT: {
                            css: {
                                maxWidth: 'none',
                                color: '#334155',
                                a: {
                                    color: '#3b82f6',
                                    textDecoration: 'none',
                                    fontWeight: '500',
                                    '&:hover': { color: '#2563eb' },
                                },
                                code: {
                                    color: '#db2777',
                                    backgroundColor: '#f1f5f9',
                                    padding: '0.2em 0.4em',
                                    borderRadius: '0.375rem',
                                    fontWeight: '400',
                                },
                                'code::before': { content: '""' },
                                'code::after': { content: '""' },
                                pre: {
                                    backgroundColor: '#f8fafc',
                                    color: '#334155',
                                    border: '1px solid #e2e8f0',
                                    borderRadius: '0.5rem',
                                },
                                blockquote: {
                                    borderLeftColor: '#cbd5e1',
                                    color: '#64748b',
                                    fontStyle: 'normal',
                                },
                            },
                        },
                    },
                },
            },
        }
    </script>

    <!-- Highlight.js (Code Syntax Highlighting) -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>

    <!-- KaTeX (Math Typesetting) -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css">
    
    <!-- Marked.js (Markdown Parser) -->
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <!-- Marked KaTeX Extension -->
    <script src="https://cdn.jsdelivr.net/npm/marked-katex-extension/lib/index.umd.js"></script>

    <style>
        /* 洗練されたカスタムスクロールバー */
        ::-webkit-scrollbar {
            width: 6px;
            height: 6px;
        }
        ::-webkit-scrollbar-track {
            background: transparent;
        }
        ::-webkit-scrollbar-thumb {
            background: #e2e8f0;
            border-radius: 10px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #cbd5e1;
        }

        body {
            margin: 0;
            overflow: hidden; /* 全体の不要なスクロールを防止 */
        }

        /* エディタ専用の等幅フォント設定 */
        .editor-textarea {
            font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace;
            line-height: 1.7;
        }

        /* プレースホルダーのスタイル */
        ::placeholder {
            color: #cbd5e1;
            opacity: 1;
        }
    </style>
</head>
<body class="bg-white text-slate-800 antialiased h-screen flex flex-col font-sans selection:bg-blue-100 selection:text-blue-900">

    <!-- ミニマルなヘッダー -->
    <header class="h-14 border-b border-slate-100 flex items-center justify-between px-8 bg-white z-10 shrink-0">
        <div class="flex items-center gap-3">
            <div class="w-2.5 h-2.5 rounded-full bg-slate-200"></div>
            <h1 class="text-xs font-semibold text-slate-400 tracking-widest uppercase">Markdown Editor</h1>
        </div>
        <div class="text-xs text-slate-400 font-medium" id="char-count">0 characters</div>
    </header>

    <!-- メインワークスペース -->
    <main class="flex-1 flex overflow-hidden">
        
        <!-- 左ペイン: エディタ -->
        <div class="w-1/2 h-full border-r border-slate-100 bg-[#fafafa] relative transition-colors focus-within:bg-white">
            <textarea 
                id="editor" 
                class="editor-textarea w-full h-full p-10 md:p-14 resize-none outline-none bg-transparent text-sm md:text-[15px] text-slate-600 focus:text-slate-800 transition-colors"
                placeholder="ここにMarkdownを入力..."
                spellcheck="false"
            ></textarea>
        </div>

        <!-- 右ペイン: プレビュー -->
        <div class="w-1/2 h-full overflow-y-auto bg-white" id="preview-container">
            <div 
                id="preview" 
                class="prose prose-slate prose-sm md:prose-base max-w-[800px] mx-auto p-10 md:p-14 break-words"
            ></div>
        </div>
    </main>

    <script>
        // --- ライブラリのセットアップ ---
        const { marked } = window;
        
        // コードハイライトの設定
        marked.setOptions({
            highlight: function(code, lang) {
                if (lang && hljs.getLanguage(lang)) {
                    try {
                        return hljs.highlight(code, { language: lang }).value;
                    } catch (__) {}
                }
                return hljs.highlightAuto(code).value; // 言語指定がない場合も自動でハイライト
            },
            langPrefix: 'hljs language-',
            breaks: true, // 改行を反映
            gfm: true     // GitHub Flavored Markdown (テーブル等)
        });

        // KaTeX (数式レンダリング) の設定
        marked.use(window.markedKatex({ throwOnError: false }));

        // --- DOM要素の取得 ---
        const editor = document.getElementById('editor');
        const preview = document.getElementById('preview');
        const previewContainer = document.getElementById('preview-container');
        const charCountDisplay = document.getElementById('char-count');

        // ご要望通り、初期テキストは完全に空にします
        editor.value = "";

        // --- レンダリング処理 ---
        const updatePreview = () => {
            const rawMarkdown = editor.value;
            
            // MarkdownをHTMLに変換して反映
            preview.innerHTML = marked.parse(rawMarkdown);

            // 文字数のカウント（空白を除外した純粋な文字数）
            const textContent = rawMarkdown.replace(/\s+/g, '').length;
            charCountDisplay.textContent = `${textContent} characters`;
        };

        // 入力時にリアルタイム更新
        editor.addEventListener('input', updatePreview);

        // --- 同期スクロール処理 ---
        let isSyncingLeft = false;
        let isSyncingRight = false;

        // 左（エディタ）から右（プレビュー）への同期
        editor.addEventListener('scroll', function() {
            if (!isSyncingLeft) {
                isSyncingRight = true;
                const percentage = this.scrollTop / (this.scrollHeight - this.clientHeight);
                // プレビュー側のスクロール位置を計算して適用
                previewContainer.scrollTop = percentage * (previewContainer.scrollHeight - previewContainer.clientHeight);
            }
            isSyncingLeft = false;
        });

        // 右（プレビュー）から左（エディタ）への同期
        previewContainer.addEventListener('scroll', function() {
            if (!isSyncingRight) {
                isSyncingLeft = true;
                const percentage = this.scrollTop / (this.scrollHeight - this.clientHeight);
                // エディタ側のスクロール位置を計算して適用
                editor.scrollTop = percentage * (editor.scrollHeight - editor.clientHeight);
            }
            isSyncingRight = false;
        });

        // 初回ロード時に一度レンダリングを実行
        updatePreview();
    </script>
</body>
</html>
